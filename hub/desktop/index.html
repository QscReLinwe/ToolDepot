<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolDepot</title>
    <script>
      // Apply stored theme or system preference before React loads to prevent flash
      (function () {
        var theme = null;
        try { var s = JSON.parse(localStorage.getItem('tooldepot:settings') || '{}'); theme = s.theme; } catch (e) {}
        if (theme === 'dark' || (theme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
